<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passive Interventions - smART Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --pkg-blue: #0E3B66;
            --pkg-gold: #C09553;
            --bg-light: #f4f4f4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg-light); color: var(--pkg-blue); overflow-x: hidden; }

        /* --- 1. HERO SECTION --- */
        .hero-container {
            width: 100%; height: 100vh; position: relative;
            background-image: url('../../assets/images/package2/Architecture/bia2.png'); /* Hình nền bia 2 */
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 80px 6%; color: #fff;
        }
        .hero-container::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(14, 59, 102, 0.5) 0%, rgba(14, 59, 102, 0.2) 100%);
            z-index: 1;
        }

        .top-nav { position: fixed; top: 0; left: 0; width: 100%; padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        
        .logo-group { display: flex; align-items: center; text-decoration: none; }
        .logo-group img { height: 45px; transition: 0.5s; }

        .back-icon-btn { 
            width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: #fff; background: rgba(14, 59, 102, 0.4); backdrop-filter: blur(10px); transition: 0.4s; text-decoration: none; border: 1px solid rgba(255,255,255,0.2);
        }
        .back-icon-btn:hover { background: #fff; color: var(--pkg-blue); transform: scale(1.1); }
        
        .top-content { position: relative; z-index: 100; align-self: flex-end; text-align: right; margin-top: 60px;}
        .top-content h1 { font-size: clamp(40px, 6vw, 85px); font-weight: 800; line-height: 1; color: transparent; -webkit-text-stroke: 1.5px #fff; text-transform: uppercase; }
        .newsletter-tag { display: inline-block; margin-top: 15px; padding: 8px 25px; background: rgba(255,255,255,0.9); color: var(--pkg-blue); border-radius: 50px; font-size: 11px; font-weight: 700; text-decoration: none; }

        .spatial-circle-wrapper { 
            position: absolute; 
            top: 55%; 
            right: 2%; 
            z-index: 50; 
            width: 220px; height: 220px; 
        }
        .circle-image { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; overflow: hidden; background: url('../../assets/images/package2/Architecture/bia3.png'); background-size: cover; }
        .circle-text { position: absolute; width: 100%; height: 100%; top: 0; left: 0; animation: rotateText 15s linear infinite; }
        @keyframes rotateText { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .circle-text svg { width: 100%; height: 100%; fill: #fff; }
        .circle-text text { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; }
        
        .hero-footer-title { position: relative; z-index: 100; font-size: 38px; font-weight: 700; text-transform: uppercase; }

        /* --- 2. DETAILS SECTION --- */
        .details-section { padding: 120px 8%; background: #fff; position: relative; z-index: 10; }
        .project-item { margin-bottom: 220px; }

        .project-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 60px; 
            align-items: center;
        }

        .col-left { display: flex; flex-direction: column; gap: 25px; }
        .project-header-title {
            font-size: 34px; font-weight: 800; color: transparent;
            -webkit-text-stroke: 1.2px var(--pkg-blue);
            text-transform: uppercase;
        }

        .img-clickable { width: 100%; height: auto; object-fit: contain; cursor: zoom-in; transition: 0.4s; }
        .img-clickable:hover { transform: scale(1.02); opacity: 0.9; }
        .img-small-wrap { width: 90%; background: #f9f9f9; min-height: 200px; display: flex; align-items: center; justify-content: center; border-radius: 8px;}
        
        .project-info { font-family: 'Inter', sans-serif; font-size: 13px; line-height: 1.8; color: #555; text-align: justify; }
        .project-info b { display: block; margin-bottom: 8px; color: var(--pkg-blue); font-size: 16px; }
        .col-right { display: flex; justify-content: center; }
        .img-large-wrap { width: 100%; background: #f9f9f9; min-height: 400px; display: flex; align-items: center; justify-content: center; border-radius: 8px;}

        /* --- 3. NÚT BACK TO TOP --- */
        .back-to-top {
            position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px;
            background: var(--pkg-blue); color: #fff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s;
            border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .back-to-top.show { opacity: 1; visibility: visible; }
        .back-to-top:hover { background: var(--pkg-gold); transform: translateY(-5px); }

        /* --- 4. LIGHTBOX --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(14, 59, 102, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 10000; cursor: zoom-out; backdrop-filter: blur(10px);
        }
        #lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; animation: zoomAnim 0.3s ease-out; }
        @keyframes zoomAnim { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 992px) {
            .project-grid { grid-template-columns: 1fr; }
            .spatial-circle-wrapper { display: none; }
        }
    </style>
</head>
<body>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Zoomed Image">
    </div>

    <div class="back-to-top" id="topBtn" onclick="scrollToTop()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </div>

    <header class="top-nav">
        <a href="../../index.html" class="logo-group">
            <img src="../../assets/images/Logo_SHLL_long.png" alt="Logo">
        </a>
        <a href="architectural-design.html" class="back-icon-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
    </header>

    <section class="hero-container">
        <div class="top-content" data-aos="fade-left">
            <h1>ARCHITECTURAL<br>DESIGN</h1>
            <a href="#" class="newsletter-tag">Sent Us Your Newsletter</a>
        </div>

        <div class="spatial-circle-wrapper" data-aos="zoom-in" data-aos-delay="500">
            <div class="circle-text">
                <svg viewBox="0 0 200 200">
                    <path id="circlePath" d="M 100, 100 m -80, 0 a 80,80 0 1,1 160,0 a 80,80 0 1,1 -160,0" fill="transparent"/>
                    <text><textPath href="#circlePath">SPATIAL EXPLORATION • SPATIAL EXPLORATION • </textPath></text>
                </svg>
            </div>
            <div class="circle-image"></div>
        </div>

        <div class="hero-footer-title" data-aos="fade-right">
            <h2>PASSIVE<br>INTERVENTIONS</h2>
        </div>
    </section>

    <section class="details-section" id="details">
        
        <!-- ITEM 1: Khung mẫu nội dung sẽ thêm sau -->
        <div class="project-item" data-aos="fade-up">
            <div class="project-grid">
                <div class="col-left">
                    <h3 class="project-header-title">SECTION TITLE</h3>
                    <div class="img-small-wrap">
                        <!-- Chỗ trống để thêm hình AD1 -->
                        <p style="color:#ccc; font-size:10px; font-weight:700">IMAGE PLACEHOLDER</p>
                    </div>
                    <div class="project-info">
                        <b>Information Title</b>
                        Content will be updated here. This section is designed for passive architecture interventions and sustainable solutions.
                    </div>
                </div>
                <div class="col-right">
                    <div class="img-large-wrap">
                        <!-- Chỗ trống để thêm hình AD2 -->
                        <p style="color:#ccc; font-size:10px; font-weight:700">IMAGE PLACEHOLDER</p>
                    </div>
                </div>
            </div>
        </div>

    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true, offset: 100 });

        window.onscroll = function() {
            var topBtn = document.getElementById("topBtn");
            if (document.body.scrollTop > 500 || document.documentElement.scrollTop > 500) {
                topBtn.classList.add("show");
            } else {
                topBtn.classList.remove("show");
            }
        };

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openLightbox(src) {
            if(!src) return;
            document.getElementById("lightbox-img").src = src;
            document.getElementById("lightbox").style.display = "flex";
            document.body.style.overflow = "hidden";
        }

        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
            document.body.style.overflow = "auto";
        }
    </script>
</body>
</html>

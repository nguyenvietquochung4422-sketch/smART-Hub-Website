<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Lab - smART Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --pkg-blue: #4183a3;
            --text-dark: #333;
            /* Màu vàng nhạt đồng bộ với nền hình ảnh */
            --bg-cream: #f9f7f2; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg-cream); color: var(--text-dark); overflow-x: hidden; }

        /* --- 1. HERO SECTION --- */
        .research-hero {
            width: 100%; height: 100vh;
            background-image: url('../../assets/images/package2/Research/bia_research.png');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* NAVIGATION & LOGO */
        .header-wrapper { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 40px 5% 20px 5%; 
            display: flex; 
            flex-direction: column; 
            background: transparent;
            z-index: 1000;
        }
        .header-top-frame { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            width: 100%; 
        }
        .logo-left img { 
            height: 30px; 
            display: block; 
        }
        .header-middle { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
        }
        .horizontal-line { 
            width: 100%; 
            height: 1px; 
            background-color: rgba(14, 59, 102, 0.15); 
        }
        .logo-right { 
            display: flex;
            align-items: center; 
        }
        .back-icon-btn { 
            width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            color: #333; background: rgba(0, 0, 0, 0.05); transition: 0.4s; text-decoration: none; 
            border: 1px solid rgba(0, 0, 0, 0.1); font-size: 14px; font-weight: bold;
        }
        .back-icon-btn:hover { 
            background: #d76a28; border-color: #d76a28; color: #fff; transform: scale(1.1); 
        }

        .main-title { text-align: center; color: var(--text-dark); z-index: 10; animation: fadeIn 1.5s ease-out; }
        .main-title h1 { font-size: clamp(40px, 8vw, 100px); font-weight: 800; text-transform: uppercase; line-height: 0.9; display: flex; flex-direction: column; align-items: center; }
        .title-lab { font-weight: 400; letter-spacing: 15px; margin-top: 10px; }

        /* Ô tròn Spatial Exploration - Đặt vị trí tránh chèn chữ */
        .spatial-circle-wrapper { 
            position: absolute; bottom: 10%; right: 5%; z-index: 50; width: 180px; height: 180px; 
        }
        .circle-image { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; overflow: hidden; background: url('../../assets/images/package2/Research/Sod_Culture_2026.png'); background-size: cover; }
        .circle-text { position: absolute; width: 100%; height: 100%; top: 0; left: 0; animation: rotateText 15s linear infinite; }
        @keyframes rotateText { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .circle-text svg { width: 100%; height: 100%; fill: var(--text-dark); }
        .circle-text text { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; }

        /* --- 2. CONTENT SECTION --- */
        .content-section { padding: 120px 8%; background: var(--bg-cream); }
        .section-header { margin-bottom: 60px; text-align: left; }
        .section-header h2 { font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .testbed-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: flex-start;
        }

        .testbed-item { display: flex; flex-direction: column; gap: 20px; }
        .testbed-item h3 { font-size: 20px; font-weight: 700; color: var(--pkg-blue); }
        
        .img-wrap { width: 100%; overflow: hidden; }
        .img-wrap img { 
            width: 100%; height: auto; object-fit: contain; 
            cursor: zoom-in; transition: 0.4s; 
        }
        .img-wrap img:hover { opacity: 0.8; }



        /* --- 4. LIGHTBOX --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 10000; cursor: zoom-out;
        }
        #lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 992px) {
            .testbed-grid { grid-template-columns: 1fr; }
            .spatial-circle-wrapper { display: none; }
        }

        /* --- CONTACT FOOTER --- */
        .footer-container { 
            border-top: none;
            padding: 40px 2% 60px 2%; 
            margin-top: 40px;
            position: relative;
            z-index: 10;
            background: transparent !important;
            color: #333333;
            width: 100%;
        }
        .footer-contact-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .footer-contact-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--pkg-blue, #4183a3);
            letter-spacing: 0.5px;
        }
        .footer-contact-line {
            flex-grow: 1;
            height: 1px;
            background-color: rgba(14, 59, 102, 0.15);
        }
        .footer-content-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 30px;
        }
        .footer-left-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            max-width: 50%;
        }
        .footer-left-col .info-text {
            font-size: 11px;
            font-style: italic;
            color: #555555;
            font-weight: 300;
            line-height: 1.6;
        }
        .footer-left-col .email-link {
            font-size: 11px;
            color: var(--pkg-blue, #4183a3);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .footer-left-col .email-link:hover {
            color: #d76a28;
            text-decoration: underline;
        }
        .footer-right-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: right;
            max-width: 50%;
        }
        .footer-right-col .brand-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--pkg-blue, #4183a3);
            letter-spacing: 0.5px;
        }
        .footer-right-col .address-text {
            font-size: 11px;
            color: #555555;
            font-weight: 300;
            line-height: 1.6;
        }
        @media (max-width: 768px) {
            .footer-left-col, .footer-right-col {
                max-width: 100%;
            }
            .footer-right-col {
                text-align: left;
            }
        }
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>



    <div class="header-wrapper">
        <div class="header-top-frame">
            <div class="logo-left">
                <a href="../../index.html"><img src="../../assets/images/Logo_SHLL_long.png" alt="SHL Logo"></a>
            </div>
            <div class="header-middle">
                <div class="horizontal-line"></div>
            </div>
            <div class="logo-right">
                <a href="index.html"><img src="../../assets/images/index/logo1.png" alt="UEH" style="height: 30px; width: auto; display: block;"></a>
            </div>
        </div>
    </div>

    <section class="research-hero">
        <div class="main-title">
            <h1><span>RESEARCH</span><span class="title-lab">LAB</span></h1>
        </div>

        <div class="spatial-circle-wrapper" data-aos="zoom-in" data-aos-delay="500">
            <div class="circle-text">
                <svg viewBox="0 0 200 200">
                    <path id="circlePath" d="M 100, 100 m -80, 0 a 80,80 0 1,1 160,0 a 80,80 0 1,1 -160,0" fill="transparent"/>
                    <text><textPath href="#circlePath">SPATIAL EXPLORATION • SPATIAL EXPLORATION • </textPath></text>
                </svg>
            </div>
            <div class="circle-image"></div>
        </div>
    </section>

    <section class="content-section">
        <div class="section-header" data-aos="fade-up">
            <h2>Sod Culture Testbed</h2>
        </div>

        <div class="testbed-grid">
            <div class="testbed-item" data-aos="fade-up">
                <h3>2025</h3>
                <div class="img-wrap">
                    <img src="../../assets/images/package2/Research/Sod_Culture_2025.png" onclick="openLightbox(this.src)" alt="Sod Culture 2025">
                </div>
            </div>

            <div class="testbed-item" data-aos="fade-up" data-aos-delay="200">
                <h3>2026</h3>
                <div class="img-wrap">
                    <img src="../../assets/images/package2/Research/Sod_Culture_2026.png" onclick="openLightbox(this.src)" alt="Sod Culture 2026">
                </div>
            </div>
        </div>
    </section>

    <footer class="footer-container">
        <div class="footer-contact-header">
            <span class="footer-contact-title">Contact</span>
            <div class="footer-contact-line"></div>
        </div>
        <div class="footer-content-row">
            <div class="footer-left-col">
                <span class="info-text">For more information of the smART Hub Living Labs.</span>
                <a href="mailto:smarthub@ueh.edu.vn" class="email-link">smarthub@ueh.edu.vn</a>
            </div>
            <div class="footer-right-col">
                <span class="brand-text">smART HUB Living Labs</span>
                <span class="address-text">UEH, Campus V 232/6 Vo Thi Sau, Xuan Hoa Ward, Ho Chi Minh City.</span>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });



        function openLightbox(src) {
            document.getElementById("lightbox-img").src = src;
            document.getElementById("lightbox").style.display = "flex";
        }
    </script>
</body>
</html>
